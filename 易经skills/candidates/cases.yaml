# 易经案例集 — 周公亲自记录的历史案例
# 来源：《易经》原文 + 注释本（周公爻辞）
# 提取原则：周公在爻辞中明确记载的实际历史事件，
#            且该事件展示了某个方法论的实际应用
# 生成时间：2026-04-21

cases:

  - id: yi_case_01
    title: 周公测日影迁都洛邑
    type: case
    source_chapter: 《益》卦·六三爻、六四爻
    source_quote: |
      六三：益之用凶事，无咎，有孚，中行告公用圭。
      六四：中行，告公从，利，用为依迁国。
    summary: |
      西周初年（公元前1037年），周公欲迁都洛阳以控制东方，
      遭遇商朝旧属等势力强烈反对。周公决定用测日影的方式寻找"地中"，
      为迁都寻找天象依据。其方法：八尺圭表夏至日正午日影一尺五寸处为"地中"。
      经测量，地中在今河南省登封市告成镇找到。周公最终成功迁都，
      从商朝旧属中分流一半人员到洛阳从事新城建设。孔子《象》辞说"自外来也"——
      指商朝旧属来自周公母亲太姒的亲属。
    bound_to:
      - 科学决策方法
      - 迁都战略
      - 利益平衡
    outcome: |
      周公成功将国都迁至洛阳，实现周国战略东移，
      商朝旧属被分流安置，政权得以稳固。
    tags: [case, historical, 周公, 迁都, 科学决策, 西周初年]

  - id: yi_case_02
    title: 商纣沉湎于酒亡国
    type: case
    source_chapter: 《既济》卦·上六爻、《未济》卦·上九爻
    source_quote: |
      《既济》上六：濡其首，厉。
      《未济》上九：有孚于饮酒，无咎。有孚失是濡其首。
      周公《酒诰》："群饮，汝勿佚，尽执拘以归于周，予其杀。"
    summary: |
      商纣王沉湎于酒色，丢失了先祖成汤的德行，最终亡国。
      周公在《既济》上六爻说"沉湎于酒，危险"，在《未济》上九爻说
      "发生粮食损失是因为沉湎于酒"——这与周公所著《酒诰》的核心思想
      完全一致。《既济》卦辞说："既济，初吉终乱"——已经成功了，
      开始吉祥但最终祸乱。周公用商纣亡国案例警示：成功后不可沉湎。
    bound_to:
      - 危机意识
      - 功成不居
      - 自我克制
    outcome: |
      商朝覆灭，周朝建立。周公以此为戒，著《酒诰》告诫周人。
    tags: [case, historical, 商纣, 亡国, 酒, 危机意识, 周公制诰]

  - id: yi_case_03
    title: 武王伐纣改朝换代
    type: case
    source_chapter: 《革》卦·九三爻、九四爻、九五爻、上六爻
    source_quote: |
      九三：征凶，贞厉，革言三就，有孚。
      九四：悔亡，有孚改命，吉。
      九五：大人虎变，未占有孚。
      上六：君子豹变，小人革面，征凶，居贞吉。
    summary: |
      以牧野之战史实为背景：周武王联合各方势力伐商纣。
      九三爻"革言三就"记录了武王伐纣前曾多次犹豫并占卜，
      最终在周公、姜尚力挺下坚定决心。
      九五爻"大人虎变"记武王威武发动事变，牧野之战纣王军队临阵倒戈。
      上六爻记武王破商后，对商朝旧属以仁德待之——
      周公建议让他们回家种自己的地，说"百姓若有过错罪在纣王一人"。
      武王以宽广胸怀完成天下安定。
    bound_to:
      - 变革决策
      - 权力和平交接
      - 宽恕与安定
    outcome: |
      牧野之战成功，商纣自焚，武王建立周朝。
      周公用"君子豹变，小人革面"记录了新朝对旧臣的宽大处理。
    tags: [case, historical, 武王, 伐纣, 革命, 改朝换代, 宽政]

  - id: yi_case_04
    title: 古公亶父迁徙岐山
    type: case
    source_chapter: 《随》卦·上六爻
    source_quote: |
      上六：拘系之，乃从维之。王用亨于西山。
      《史记》载：古公亶父与族人原住豳国，商武乙年间辗转迁徙至岐山。
    summary: |
      周太王古公亶父原居豳国（今陕西彬县），因戎狄侵扰，
      率族人辗转迁徙至岐山周原。《随》上六爻"王用亨于西山"即记此事。
      周公用"拘系之，乃从维之"形容迁徙之艰难——如同依附丈夫离开儿子般，
      牵动整个部族。孔子在《随》卦《彖》中说"天下随时"，肯定了选择迁徙
      顺应时势的智慧。古公亶父迁岐后，周族得以发展壮大，为武王伐纣奠定基础。
    bound_to:
      - 战略迁徙
      - 顺应时势
      - 生存抉择
    outcome: |
      周族成功迁徙至岐山，得以休养生息，最终发展至"天下三分其二归周"。
    tags: [case, historical, 古公亶父, 迁徙, 周族崛起, 岐山]

  - id: yi_case_05
    title: 立太子之慎重
    type: case
    source_chapter: 《震》卦·全文
    source_quote: |
      卦辞：震，亨。震来虩虩，笑言哑哑，震惊百里，不丧匕鬯。
      孔子《序卦传》："主器者莫若长子，故受之以震。"
      初九：震来虩虩，后笑言哑哑，吉。
      六五：震往来厉，亿无丧，有事。
    summary: |
      《震》卦专讲立太子之事。"震"即"立太子"（非打雷之意）。
      周公用六爻系统阐述立太子的全部要点：
      · 初九：立太子历来需要小心谨慎，继承者有人欢喜有人忧；
      · 六二：太子需依礼排列，慎重行事；
      · 六三：按排行立储，不能随意；
      · 九四：立太子不能固执任性，否则凶险；
      · 六五：无论过去未来，立太子事关国家安危；
      · 上六：立太子取决于排行（嫡长顺序），不能凭个人好恶改变。
      孔子《彖》辞总结："不丧匕鬯，出可以守宗庙社稷，以为祭主也。"
    bound_to:
      - 嫡长继承制
      - 政权传承
      - 谨慎决策
    outcome: |
      西周确立嫡长子继承制，成为后世中国王朝政权传承的基本原则。
    tags: [case, historical, 立太子, 嫡长继承, 政权传承, 周公制礼]

  - id: yi_case_06
    title: 帝乙归妹——和亲政策
    type: case
    source_chapter: 《归妹》卦·六五爻
    source_quote: |
      六五：帝乙归妹，以祉元吉，以贵行也。
      《史记》载：帝乙把女儿太姒嫁给姬昌，是商周和解政策。
    summary: |
      商王文丁杀季历后，周与商结仇。文丁死后，帝乙为避免东西受敌，
      将女儿太姒嫁给姬昌，以此方式向周人致歉，缓和关系，得以专心平定东夷。
      周公用"帝乙归妹"记录此事，并解读为"以贵行也"——
      用和亲手段实现政治目的。"归妹"按周公理解意为"除去愚昧"，
      指通过和亲化解仇恨、消除误解的政策智慧。此政策为周族赢得了
      十年以上的发展时间，直至文王去世时周已"天下三分其二归周"。
    bound_to:
      - 和亲外交
      - 政治和解
      - 战略缓和
    outcome: |
      商周关系缓和，帝乙得以平定东夷；周族获得发展期，奠定伐商基础。
      太姒即为周公之母。
    tags: [case, historical, 帝乙归妹, 和亲, 外交, 商周关系]

  - id: yi_case_07
    title: 周公摄政与"不事王侯"
    type: case
    source_chapter: 《蛊》卦·六五爻、上九爻
    source_quote: |
      六五：干父之蛊，用誉。
      上九：不事王侯，高尚其事。
      孔子《象》："志可则也。"
    summary: |
      周公在武王病重时设坛祈祷，愿以身替武王，并称自己"多才多艺，能事鬼神"。
      武王死后，周公辅佐成王，摄政当国，管叔、蔡叔、武庚叛乱，
      周公率军东征平叛，稳定周朝。《蛊》卦六五"干父之蛊，用誉"，
      记周公捍卫父亲（文王）遗志，辅佐幼主；上九"不事王侯，高尚其事"，
      记周公在成王年长后主动还政，不贪王位，功成身退。
      孔子赞叹："志可则也"——周公的志向堪为模范。
      周公一生鞠躬尽瘁，制礼作乐，是《易经》爻辞作者的核心证据之一。
    bound_to:
      - 忠臣之道
      - 功成身退
      - 辅佐与授权
    outcome: |
      周公成功辅佐成王，还政后专心制礼作乐，
      奠定西周礼乐文明根基，成为后世楷模。
    tags: [case, historical, 周公, 摄政, 忠臣, 功成身退, 制礼作乐]

  - id: yi_case_08
    title: 高宗伐鬼方——三年克之
    type: case
    source_chapter: 《既济》卦·九三爻
    source_quote: |
      九三：高宗伐鬼方，三年克之，小人勿用。
    summary: |
      商朝中兴帝王高宗（武丁）征伐西北边疆国家鬼方，历时三年才完成。
      周公用此案例说明：《既济》卦"初吉终乱"的规律——即使成功了，
      也需要付出巨大代价，长期征伐耗尽国力。
      "小人勿用"警示：此类长期战争不能用德才低下之人，否则后患无穷。
      《未济》卦九四亦载："震用伐鬼方，三年有赏，于大国"——
      记武丁伐鬼方后受到嘉奖，其历史被周公反复引用作为正面经验。
      同一事件在不同卦中兼有正反两面解读，体现周公的历史辩证法。
    bound_to:
      - 持久战风险
      - 用人原则
      - 代价评估
    outcome: |
      商高宗武丁最终征服鬼方，但"三年克之"说明代价极大，
      周公借此警示成功后的隐患与用人之道。
    tags: [case, historical, 高宗, 武丁, 伐鬼方, 持久战, 历史辩证]

  - id: yi_case_09
    title: 周文王积善行仁天下归心
    type: case
    source_chapter: 《易经》综论·文王相关卦辞
    source_quote: |
      《系辞下》孔子："当文王与纣之事耶？是故其辞危。"
      《史记》："文王拘而演周易……天下三分，其二归周。"
    summary: |
      周文王被商纣囚禁于羑里七年，仍笃行仁德，积善累德。
      他勤于政事，礼贤下士，拜姜尚为军师，问以军国大计。
      外交上成功调解虞芮两国争田纠纷，使河东小国纷纷归附。
      诸侯皆视文王为取代商纣的"受命之君"。
      周公在爻辞中多处暗记文王事迹，并以文王"天下二分归周"的
      实际成就证明"积善行仁"方法论的有效性。文王之道是坤卦
      "厚德处事"哲学的典型实践。
    bound_to:
      - 仁德治国
      - 积善累德
      - 天下归心
    outcome: |
      文王在位五十年，周族由方伯崛起为天下归心的准天子，
      为武王伐纣奠定道德与人心基础。
    tags: [case, historical, 文王, 积善行仁, 天下归周, 道德征服]

  - id: yi_case_10
    title: 东邻杀牛不如西邻夏祭
    type: case
    source_chapter: 《既济》卦·九五爻
    source_quote: |
      九五：东邻杀牛，不如西邻之禴祭，实受其福。
      《象》曰："东邻杀牛，不如西邻之时也；实受其福，吉大来也。"
    summary: |
      周公用商周祭祀对比说明"合于时宜"的重要性：
      商国在春天（东邻）杀牛祭祀——春耕时节损失最强劳动力；
      周国在夏天（西邻）行禴祭——夏祭顺天时、不误农耕。
      商国虽祭品隆重（杀牛），但时机不对，徒劳无功；
      周国祭品简单（禴祭），但时机合宜，收获实受其福。
      此案例是周公"与时偕行"方法论的具体应用，
      警示治国须合于时宜，不可逆天时而动。
    bound_to:
      - 与时偕行
      - 务实决策
      - 天时地利
    outcome: |
      周因祭祀合于时宜而得福，商因逆天时而失德。
      周公以此说明一切行事须顺时而行。
    tags: [case, historical, 祭祀, 时宜, 天时, 周商对比, 治国智慧]