# 《易经》关键概念词典（作者定义 vs 常识）
# Book2Skill Pipeline - Subagent Output
# 用途：供 skill-creator 构建《易经》操作技能时的术语澄清参考

glossary:

  - id: g01
    term: 乾
    type: term
    source_chapter: 乾卦（第一卦）
    author_definition: |
      "大哉乾元，万物资始，乃统天。"
      "乾"非指天道之"天"，而是指帝王规划未来、总揽一切的治国方略。
      乾元，即以"元"之道启动规划，使万物得以始生。
    key_distinction: |
      ≠ 常识用法 — 传统理解为"天道"、"阳"、"男性"，是自然哲学概念
      = 作者特定用法 — 帝王管理国家的规划能力与方略，是政治哲学概念
    why_it_matters: |
      下游技能中"乾"将作为"战略规划/前瞻决策"的隐喻符号，而非"天/阳"抽象概念。
      若不澄清，技能会误读"亢龙有悔"等爻辞的政治含义。
    tags: [term, core-concept, 乾卦, 治国方略]

  - id: g02
    term: 坤
    type: term
    source_chapter: 坤卦（第二卦）
    author_definition: |
      "至哉坤元，万物资生，乃顺承天。"
      "坤"非指大地之"地"，而是指帝王以厚德处事、辅佐规划的治国方式。
      坤之道在于承顺，以德配乾。
    key_distinction: |
      ≠ 常识用法 — 传统理解为"地道"、"阴"、"女性"，是自然哲学概念
      = 作者特定用法 — 帝王以厚德处事的执政方法，是政治哲学概念
    why_it_matters: |
      下游技能中"坤"将作为"执行/辅佐/柔顺决策"的隐喻符号。
      混淆则无法理解"坤"与"乾"的治国互补关系。
    tags: [term, core-concept, 坤卦, 治国方略]

  - id: g03
    term: 龙
    type: term
    source_chapter: 乾卦·用九
    author_definition: |
      "见龙在田，利见大人……飞龙在天，利见大人。"
      "龙"非神兽，而是文王、周公所制治国规划的象征——雄健、华丽、有力。
      以龙喻规划之气象，喻治国方略充满活力与变化。
    key_distinction: |
      ≠ 常识用法 — 传统理解为中华民族的吉祥神兽，是文化图腾
      = 作者特定用法 — 国家规划的象征意象，喻治国方略的雄健与华丽
    why_it_matters: |
      "潜龙勿用"、"飞龙在天"等爻辞全部与治国规划的状态有关，非字面神兽含义。
      下游技能若按神兽理解，将完全偏离政治哲学框架。
    tags: [term, core-concept, 乾卦, 隐喻]

  - id: g04
    term: 亨
    type: term
    source_chapter: 乾卦·文言
    author_definition: |
      "亨者，嘉之会也。"
      "亨"非通顺之意，而是指帝王的决策得以顺利执行、成果汇聚。
      亨通即决策成功、诸事顺畅。
    key_distinction: |
      ≠ 常识用法 — 常规解释为"通顺"、"亨通"，是吉兆形容词
      = 作者特定用法 — 决策顺利执行、成果汇聚，是政治成效术语
    why_it_matters: |
      "元亨利贞"之"亨"不是简单的吉利兆头，而是治国规划成功之亨。
      下游技能用于判断决策成效时有重要意义。
    tags: [term, core-concept, 卦辞四德]

  - id: g05
    term: 贞
    type: term
    source_chapter: 乾卦·文言
    author_definition: |
      "贞者，事之干也。"
      "贞"非占卜之意，而是指坚定不移、持守正道的行为。
      贞正即坚定不移地执行正确决策。
    key_distinction: |
      ≠ 常识用法 — 常规解释为"占卜"、"问卦"，是占术术语
      = 作者特定用法 — 坚定不移（持守正道），是治国者的坚定品格
    why_it_matters: |
      "元亨利贞"之"贞"与占卜无关，而是与"亨"配对的治国德性：
      亨=决策成功，贞=坚定执行。下游技能理解二者关系才能正确解卦。
    tags: [term, core-concept, 卦辞四德]

  - id: g06
    term: 元
    type: term
    source_chapter: 乾卦·文言
    author_definition: |
      "元者，善之长也。"
      "元"非起始之意，而是指使决策完备、周全。
      元德即使一切安排周全无缺。
    key_distinction: |
      ≠ 常识用法 — 常规解释为"起始"、"开始"，是时间概念
      = 作者特定用法 — 使之周全（决策完备性），是治国者谋划周全的能力
    why_it_matters: |
      "元亨利贞"之"元"是四德之首，指决策前的完备性考量。
      下游技能需理解此为"周全性"而非"起点性"，才能正确评估决策质量。
    tags: [term, core-concept, 卦辞四德]

  - id: g07
    term: 彖
    type: term
    source_chapter: 系辞上传（孔子作彖传）
    author_definition: |
      彖者，断也。判断卦辞之含义。
      孔子解释卦辞的判断性文字，即"彖传"。
    key_distinction: |
      ≠ 常识用法 — 常规解释为"猪的脖颈"（彖=断豕），是字源误解
      = 作者特定用法 — 孔子对卦辞含义的判断，是经传解释术语
    why_it_matters: |
      下游技能处理《易经》文本层次时，需区分：
      卦辞（周文王）→ 彖传（孔子判断）→ 象传（孔子爻辞解释）→ 文言（孔子义理阐发）
      不澄清则层次混淆。
    tags: [term, core-concept, 经传结构]

  - id: g08
    term: 象
    type: term
    source_chapter: 系辞上传
    author_definition: |
      "易者，象也。象也者，像也。"
      "象"非仅指符号，而是通过卦象模拟万物之形容、象征事物规律。
      象是易的核心方法：以卦模拟万象。
    key_distinction: |
      ≠ 常识用法 — 常规解释为"大象"（动物）或简单符号
      = 作者特定用法 — 通过卦象象征事物规律，是易的认知方法论
    why_it_matters: |
      "象"是易理的核心工具。下游技能需要理解：
      八卦→ 六十四卦→ 三百八十四爻，每一层次都在"象其物宜"。
      不理解"象"就无法理解为何需要卦象系统。
    tags: [term, core-concept, 易理方法论]

  - id: g09
    term: 道
    type: term
    source_chapter: 系辞上传/下传（多章节）
    author_definition: |
      "一阴一阳之谓道。"
      "道"非泛指的道德或道路，而是《周易》的学说体系——
      即帝王管理国家的法则与规律。
      道是阴阳变化的规律，用于治国。
    key_distinction: |
      ≠ 常识用法 — 常规理解为哲学化的"道路"、"道德原则"，是泛化概念
      = 作者特定用法 — 《周易》的治国学说与法则，是政治哲学核心概念
    why_it_matters: |
      "道"在《易经》中是明确的政治治理学说，不是抽象哲学。
      下游技能若按老子"道"理解，将偏离《易经》的政治应用框架。
    tags: [term, core-concept, 政治哲学]

  - id: g10
    term: 太极
    type: term
    source_chapter: 系辞上传
    author_definition: |
      "易有太极，是生两仪。"
      "太极"非"终极真理"，而是宇宙起源的原始状态——
      阴阳两仪尚未分离的混沌整体。
    key_distinction: |
      ≠ 常识用法 — 常见误解为"终极真理"、"绝对统一"，是宋明理学化概念
      = 作者特定用法 — 宇宙起源状态（两仪未分），是宇宙生成论概念
    why_it_matters: |
      太极是易理宇宙论的起点，下游技能理解：
      太极（混沌）→ 两仪（阴阳）→ 四象 → 八卦
      若把太极当成"终极真理"，会误入宋明理学的理气框架，而非易经的生成论。
    tags: [term, core-concept, 宇宙生成论]