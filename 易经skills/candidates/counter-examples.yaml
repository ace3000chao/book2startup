# 易经反例/警告模式提取
# 来源：book2skill pipeline - 易经蒸馏
# 生成时间：2026-04-21

counter_examples:
  # ============================================================
  # 一、亢龙有悔系列（《乾卦》）
  # ============================================================

  - id: ce01
    title: 亢龙有悔——极端冒进的下场
    type: counter-example
    source_chapter: 《乾》卦·上九
    source_quote: |
      《乾》：上九，亢龙有悔。
      何谓也？子曰："贵而无位，高而无民，贤人在下位而无辅，
      是以动而有悔也。"
      "亢"之为言也，知进而不知退，知存而不知亡，知得而不知丧。
      其唯圣人乎？知进退存亡而不失其正者，其唯圣人乎！
    failure_mode: |
      处于极高位置时盲目冒进，不知收敛，最终招致灾祸。
      具体表现：地位极高却失去根基民众支持，贤能之人无法辅助，
      行动处处后悔。
    mechanism: |
      1. "贵而无位"：有头衔却无实权，位置虚高
      2. "高而无民"：身份显赫却脱离群众基础
      3. "贤人在下位无辅"：真正的人才在下面无法进入核心，
         导致孤立无援
      根本原因：只知道前进不知道后退，知道存在不知道消亡，
      知道获取不知道失去。
    warning_signs:
      - 只知进不知退
      - 只知存不知亡
      - 只知得不知丧
      - 众叛亲离
      - 行动处处后悔
    bound_to:
      - 限制"敢为天下先"skill的滥用——并非所有时刻都适合激进
      - 限制"快速扩张"类策略的盲目应用
      - 提醒"巅峰时刻"需谨慎决策
    tags: [counter-example, 亢龙, 冒进, 不知退, 《乾》]

  - id: ce02
    title: 乾卦九五——盛极而衰的警示
    type: counter-example
    source_chapter: 《乾》卦·九五
    source_quote: |
      九五：飞龙在天，利见大人。
      上九：亢龙有悔。
      亢之为言也，知进而不知退，知存而不知亡，知得而不知丧。
    failure_mode: |
      在巅峰状态时未能及时调整战略，导致从顶点滑落。
      九五"飞龙在天"本是极盛，但紧接着上九"亢龙有悔"说明
      极盛之后若不知收敛，必然走向衰败。
    mechanism: |
      巅峰状态容易滋生傲慢与盲目自信，
      决策者被胜利冲昏头脑后继续冒进，
      导致资源透支、关系破裂、创新停滞。
    warning_signs:
      - 成功后立即大幅扩张
      - 决策速度明显加快
      -听不进不同意见
      - 资源消耗速度远超往常
    bound_to:
      - 限制"规模经济"类正面skill在鼎盛期的过度应用
      - 对"连续胜利"状态下的战略保持警惕
    tags: [counter-example, 盛极而衰, 巅峰, 《乾》]

  # ============================================================
  # 二、商纣的教训——酒与亡国
  # ============================================================

  - id: ce03
    title: 商纣沉湎于酒——放纵导致亡国
    type: counter-example
    source_chapter: 《易经》相关记载（参照《既济》《未济》相关警示）
    source_quote: |
      伏羲氏没，神农氏作，斲木为耜，揉木为耒，耒耨之利，以教天下。
      日中为市，致天下之民，聚天下之货，交易而退，各得其所。
      神农氏没，黄帝、尧、舜氏作，通其变，使民不倦；
      神而化之，使民宜之。
      ……后世圣人易之以宫室，上栋下宇，以待风雨。
      ……上古丧乱，殷纣之中 Martino 净酒是也。
      酒为粮食造，少喝保安定。
    failure_mode: |
      统治者在极端富裕的环境中沉迷酒色，丧失清醒判断力，
      最终导致国家覆灭。商纣王的案例说明：
      物质极端丰富时，统治者若放纵物欲，将失去对国家的控制。
    mechanism: |
      1. 酒精度使人判断力下降
      2. 沉迷享乐导致忽视国事
      3. 酒宴形成的信息茧房隔绝真实民情
      4. 纵欲削弱身体与精神状态
      核心：物质丰富时期的放纵会摧毁治理能力。
    warning_signs:
      - 频繁的酒宴与享乐活动
      - 对批评声音的回避
      - 决策越来越脱离实际
      - 核心团队不敢说真话
    bound_to:
      - 限制"高回报高奖励"类激励机制在物质丰富后的滥用
      - 对"庆功文化"发出警告
      - 提醒成功后的领导力陷阱
    tags: [counter-example, 商纣, 酒, 亡国, 放纵]

  # ============================================================
  # 三、坤卦文言——善恶积累的因果
  # ============================================================

  - id: ce04
    title: 积不善之家必有余殃——恶行积累的灾难性后果
    type: counter-example
    source_chapter: 《坤》卦·文言
    source_quote: |
      积善之家，必有余庆；积不善之家，必有余殃。
      臣弑其君，子弑其父，非一朝一夕之故。
      其所由来者渐矣，由辩之不早辩也。
    failure_mode: |
      个人或组织持续积累负面行为（欺骗、背叛、不义），
      最终必然招致灾难性的后果。
      具体表现：家庭中有人弑君杀父，组织中出现背叛与内斗。
      这些不是突然发生的，而是长期积累的结果。
    mechanism: |
      1. 负面行为有积累效应——小恶累积成大恶
      2. 量变到质变——长期不察觉导致最终爆发
      3. 环境固化——习惯一旦形成难以改变
      核心：不善行为的积累会从根本上瓦解组织的信任基础，
      最终在某个临界点突然爆发。
    warning_signs:
      - 内部不信任感增加
      - 沟通中越来越多保留与隐瞒
      - 小冲突频繁发生
      - 成员开始抱团而非整体协作
      - 领导层出现分裂迹象
    bound_to:
      - 限制"效率优先"类策略对伦理的忽视
      - 对"目标导向不择手段"的警告
      - 提醒组织文化建设的长期重要性
    tags: [counter-example, 积累, 恶行, 灾难, 《坤》]

  - id: ce05
    title: 防微杜渐的缺失——履霜坚冰至
    type: counter-example
    source_chapter: 《坤》卦·初六
    source_quote: |
      《坤》卦初六：履霜，坚冰至。
      象曰：履霜坚冰，阴始凝也。驯致其道，至坚冰也。
    failure_mode: |
      在危机初现时（踩到霜）未能引起警觉和采取行动，
      导致危机逐渐累积最终爆发（结冰）。
      具体表现：对早期的负面信号视而不见，
      让问题在暗中持续恶化，最终无法收拾。
    mechanism: |
      1. 忽视初期微弱信号
      2. 对问题早期干预成本估计过低
      3. 侥幸心理——"这只是暂时的"
      4. 小问题累积成系统性问题
      核心：危机有渐进性，早期干预成本最低。
    warning_signs:
      - 出现首次负面信号时不上报
      - 问题重复出现但无人追踪
      - 开始找借口合理化问题
      - 团队中开始有人悄悄准备后路
    bound_to:
      - 限制"试错迭代"类方法对问题初期的忽视
      - 对"小问题先放放"心态的警告
      - 提醒建立早期预警机制
    tags: [counter-example, 防微杜渐, 忽视预警, 《坤》]

  # ============================================================
  # 四、师卦——用人失当的灾难
  # ============================================================

  - id: ce06
    title: 小人勿用必乱邦——用错人的灾难性后果
    type: counter-example
    source_chapter: 《师》卦·上六
    source_quote: |
      《师》：上六，大君有命，开国承家，小人勿用。
      象曰：大君有命，以正功也。小人勿用，必乱邦也。
    failure_mode: |
      在建立政权或组织时，任用小人（无德无才之人）担任重要职位，
      导致国家或组织陷入混乱。
      具体表现：小人得势后争权夺利，内斗激烈，组织目标被遗忘。
    mechanism: |
      1. 小人无全局视野，只有私利
      2. 小人善于投机和钻空子
      3. 小人存在时正气受压，人才流失
      4. 小人之间互相斗争以巩固位置
      核心：权力结构中一旦小人比例过高，组织效率急剧下降。
    warning_signs:
      - 关键岗位人员频繁更换
      - 决策执行走形严重
      - 内部斗争公开化
      - 真正的人才纷纷离开
      - 业绩数据与实际状态严重不符
    bound_to:
      - 限制"唯才是举"类方法论忽视品德考察
      - 对"矮子里面选将军"用人策略的警告
      - 提醒关键岗位任命时品德的重要性
    tags: [counter-example, 小人, 用人失当, 乱邦, 《师》]

  # ============================================================
  # 五、阻塞不通导致的灾祸
  # ============================================================

  - id: ce07
    title: 穷之灾也——阻塞不通的灾难
    type: counter-example
    source_chapter: 《易经》通论（蹇卦、困卦相关）
    source_quote: |
      蹇卦：蹇，难也，险在前也。见险而能止，知矣哉！
      蹇之时用大矣哉！
      困：亨，贞大人吉，无咎。有言不信。
      困穷而不通，事物的恶性循环达到极限，
      资源耗尽、路径封闭、无法突破。
    failure_mode: |
      在路径封闭、资源耗尽、无法突破的状态下仍然强行推进，
      导致灾难性后果。
      具体表现：资金链断裂后继续扩张，渠道堵塞后加大营销投入，
      团队士气崩溃后继续施压。
    mechanism: |
      1. 资源已耗尽，但惯性仍在推进
      2. 路径封闭，但决策层不知道或不相信
      3. 恶性循环一旦启动难以自行停止
      4. 止损时机延误，导致全面崩溃
      核心：在封闭系统中继续输入，只会导致更严重的崩溃。
    warning_signs:
      - 核心资源持续消耗但产出停滞
      - 多条路径尝试均告失败
      - 团队状态持续下滑
      - 外部环境快速恶化
      - 挣扎感明显加强
    bound_to:
      - 限制"坚持就是胜利"类鸡汤策略的滥用
      - 对"最后一把"心态的警告
      - 提醒需要评估止损时机
    tags: [counter-example, 阻塞, 穷途, 止损, 《蹇》《困》]

  # ============================================================
  # 六、明夷卦——光明受损的警示
  # ============================================================

  - id: ce08
    title: 明入地中明夷——光明被遮蔽的灾难
    type: counter-example
    source_chapter: 《明夷》卦
    source_quote: |
      《明夷》：明入地中，明夷。
      君子以莅众，用晦而明。
      明夷者，文明受伤、暗主在外也。
      箕子之明夷，利贞。
    failure_mode: |
      当政治环境极度恶化、光明被遮蔽（暗主当道）时，
      仍然坚持正面强攻的策略，导致损失惨重。
      具体表现：在不友善的环境中高调行事、锋芒太露、
      成为被攻击目标。
    mechanism: |
      1. 环境已不支持正面行动
      2. 高调行事引发敌意
      3. 资源消耗在无法产生结果的领域
      4. 树大招风引火烧身
      核心：逆势而行，资源浪费与损失无法避免。
    warning_signs:
      - 环境明显变恶劣
      - 多次行动无果
      - 盟友态度明显转变
      - 受到打压的频率增加
      - 资源获取难度上升
    bound_to:
      - 限制"正面硬刚"类策略在不友善环境中的应用
      - 对"硬实力突破"策略的边界提醒
      - 提醒"时势"判断的重要性
    tags: [counter-example, 明夷, 逆势, 遮蔽, 《明夷》]

  # ============================================================
  # 七、否卦——闭塞不通的灾难
  # ============================================================

  - id: ce09
    title: 否之匪人——闭塞不通的恶果
    type: counter-example
    source_chapter: 《否》卦
    source_quote: |
      《否》：否之匪人，不利君子贞。大往小来。
      象曰：天地不交而万物不通也，上下不交而天下无邦也。
      内阴而外阳，内柔而外刚，内小人而外君子。
      故君子道消，小人道长。
    failure_mode: |
      当组织或环境完全闭塞、资源无法流通、沟通完全断裂时，
      仍然强行以君子方式行事（指望沟通和合作），
      导致彻底失败。
      具体表现：在封闭系统内尝试开放合作，被小人排挤，
      资源耗尽后失败。
    mechanism: |
      1. 系统已经完全闭塞，内部小人当道
      2. 君子之道在此环境无法施展
      3. 小人得势导致君子道消
      4. 资源与机会只在小圈子内部分配
      核心：与环境不匹配的策略必然失败。
    warning_signs:
      - 多次正式沟通无回应
      - 重要会议不被邀请
      - 决策影响力明显下降
      - 资源被小圈子把控
      - 核心人员开始边缘化
    bound_to:
      - 限制"开放合作"类方法论在封闭环境中的应用
      - 对"清高"策略的局限性提醒
      - 提醒识别环境的重要性
    tags: [counter-example, 否, 闭塞, 小人道长, 《否》]

  # ============================================================
  # 八、剥卦——基础崩塌的警示
  # ============================================================

  - id: ce10
    title: 山附于地剥——基础被侵蚀的崩溃
    type: counter-example
    source_chapter: 《剥》卦
    source_quote: |
      《剥》：剥也，不利有攸往。
      象曰：山附于地，剥。上以厚下安宅。
      剥床以足，剥床以辨。
    failure_mode: |
      当基础被逐步侵蚀（床足→床辨→床本身）时，
      没有及时加固，反而继续耗尽资源去维持表面，
      最终整体崩溃。
      具体表现：核心团队流失→核心能力丧失→组织崩溃。
    mechanism: |
      1. 基础侵蚀是渐进的，不易察觉
      2. 每次侵蚀看起来都不是致命的
      3. 修复基础被认为是"不紧急"
      4. 到了无法修复时已经太晚
      核心：基础决定上层建筑的稳定性。
    warning_signs:
      - 核心人员流动率上升
      - 关键资源库存持续下降
      - 质量指标连续下滑
      - 客户投诉率上升
      - 合作伙伴态度明显转变
    bound_to:
      - 限制"快速增长"类策略对基础建设的忽视
      - 对"扩张优先"策略的边界提醒
      - 提醒关注基础指标
    tags: [counter-example, 剥, 基础崩塌, 侵蚀, 《剥》]

  # ============================================================
  # 总结：反例模式一览
  # ============================================================

# 反例模式的核心类型：
# 1. 极端冒进型：亢龙有悔——不知道何时收手
# 2. 放纵失度型：商纣沉酒——物质丰富后失去节制
# 3. 恶行积累型：积不善之余殃——小恶累积成大灾
# 4. 忽视预警型：履霜坚冰至——初期信号被忽略
# 5. 用人失当型：小人勿用——关键岗位任命错误
# 6. 阻塞穷途型：穷之灾——路径封闭后强行推进
# 7. 逆势而行型：明入地中——在不友善环境中硬冲
# 8. 环境错配型：否之匪人——策略与环境不匹配
# 9. 基础崩塌型：山附于地——基础侵蚀最终崩溃

# 每个反例的共同特征：
# - 都是可以预防的
# - 都有早期预警信号
# - 都是由于违背了某些基本原则
# - 都可以通过及时干预避免